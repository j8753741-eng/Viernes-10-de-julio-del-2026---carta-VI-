<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>✦ Donde Siempre Vuelve Mi Corazón ✦</title>

<style>
    body{
        margin:0;
        padding:0;
        background:#1a1410;
        display:flex;
        justify-content:center;
        align-items:center;
        font-family:"Garamond", serif;
        color:#2b1d14;
    }

    .book-page{
        width:800px;
        min-height:100vh;
        background:linear-gradient(135deg,#f5ecd8,#e8dcc0);
        padding:60px 70px;
        box-shadow:0 0 40px rgba(0,0,0,0.6);
        position:relative;
        border:2px solid #c2a878;
    }

    .ornament-top,
    .ornament-bottom{
        text-align:center;
        font-size:18px;
        letter-spacing:6px;
        color:#7a5c3b;
    }

    .chapter-title{
        text-align:center;
        margin-top:30px;
        font-size:22px;
        letter-spacing:2px;
    }

    .meta{
        text-align:center;
        margin-top:10px;
        font-size:14px;
        opacity:.8;
    }

    .content{
        margin-top:60px;
        min-height:300px;
        border:1px dashed #b79a6b;
        padding:20px;
        text-align:center;
        line-height:1.8;
        font-size:16px;
        font-style:italic;
    }

    .status{
        text-align:center;
        margin-top:40px;
        font-style:italic;
        color:#6b4e2e;
    }

    .seal{
        margin:50px auto 0;
        width:70px;
        height:70px;
        border-radius:50%;
        background:#7b2e2e;
        border:3px solid #d4af7a;
        box-shadow:inset 0 0 10px rgba(0,0,0,.5);
    }

    .page-number{
        position:absolute;
        right:30px;
        bottom:20px;
        font-size:14px;
        color:#7a5c3b;
    }
</style>
</head>

<body>

<div class="book-page">

    <div class="ornament-top">
        ✦ ❦ ✦ ❦ ✦ ❦ ✦
    </div>

    <div class="chapter-title">
        Capítulo VI
    </div>

    <div class="meta">
        Viernes 10 de julio de 2026 • Noche
    </div>

    <div class="content">
        <strong>Página en proceso de escritura...</strong>
    </div>

    <div class="status">
        ✎ Capítulo en construcción dentro del antiguo libro <br>
        <em>✦ Donde Siempre Vuelve Mi Corazón ✦</em>
    </div>

    <div class="seal"></div>

    <div class="page-number">
        ❦ &nbsp; VI &nbsp; ❦
    </div>

    <div class="ornament-bottom">
        ✦ ❦ ✦ ❦ ✦ ❦ ✦
    </div>

</div>

</body>
</html>
